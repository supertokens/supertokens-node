name: "Pre commit hook check"

on:
    pull_request:
        types:
            - opened
            - reopened
            - edited
            - synchronize

permissions:
    contents: read

jobs:
    pr-title:
        name: Pre commit hook check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
            - run: rm -rf .git && git init && git add --all && git -c user.name='test' -c user.email='test@example.com' commit -m 'init for pr action'
            - run: npm i --force && cd test/with-typescript && npm i --force
            - run: ./hooks/pre-commit.sh
