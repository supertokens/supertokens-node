name: "Website Tests"

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - labeled
            - unlabeled
    push:
        branches:
            - "[0-9]+.[0-9]+"
        paths-ignore:
            - "**.md"
            - "docs/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    skip-check:
        runs-on: ubuntu-latest
        outputs:
            should-skip: ${{ steps.skip.outputs.should_skip }}
        steps:
            - uses: fkirc/skip-duplicate-actions@v5
              id: skip
              with:
                  paths: '["lib/**", "test/**", "package.json", "package-lock.json", "tsconfig.json"]'
                  paths_ignore: '["lib/ts/version.ts", "lib/build/version.js"]'
                  skip_after_successful_duplicate: "true"

    define-versions:
        if: |
            needs.skip-check.outputs.should-skip != 'true' &&
            (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
        needs: [skip-check]
        runs-on: ubuntu-latest
        outputs:
            coreCdiVersionMap: ${{ steps.matrix.outputs.coreCdiVersionMap }}
            fdiVersionMap: ${{ steps.matrix.outputs.fdiVersionMap }}
            testMatrix: ${{ steps.matrix.outputs.testMatrix }}
        steps:
            - uses: actions/checkout@v4
            - uses: supertokens/actions/generate-test-matrix@main
              id: matrix
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  include-cdi: "true"
                  include-fdi: "true"
                  upstream-fdi-repos: '["supertokens-website","supertokens-node"]'
                  extra-axes: '{"node-version":["20"]}'
                  latest-extra: '{"node-version":"20"}'

    test:
        if: |
            needs.skip-check.outputs.should-skip != 'true' &&
            (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
        runs-on: ubuntu-latest
        needs: [skip-check, define-versions]
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.define-versions.outputs.testMatrix) }}

        steps:
            - name: Setup ENVs
              id: envs
              run: |
                  APP_SERVER_LOG_DIR=${{ github.workspace }}/logs
                  echo "APP_SERVER_LOG_DIR=$APP_SERVER_LOG_DIR" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

                  mkdir -p $APP_SERVER_LOG_DIR

            - uses: actions/checkout@v4
              with:
                  path: supertokens-node

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Get versions from current FDI/CDI version
              id: versions
              run: |
                  coreVersion=$(echo '${{ needs.define-versions.outputs.coreCdiVersionMap }}' | jq -r '.["${{ matrix.cdi-version }}"]')
                  nodeVersion=$(echo '${{ needs.define-versions.outputs.fdiVersionMap }}' | jq -r '.["supertokens-node"]["${{ matrix.fdi-version }}"]')
                  websiteVersion=$(echo '${{ needs.define-versions.outputs.fdiVersionMap }}' | jq -r '.["supertokens-website"]["${{ matrix.fdi-version }}"]')

                  echo "coreVersion=${coreVersion}" >> $GITHUB_OUTPUT
                  echo "nodeVersion=${nodeVersion}" >> $GITHUB_OUTPUT
                  echo "websiteVersion=${websiteVersion}" >> $GITHUB_OUTPUT

            - name: Start core
              working-directory: supertokens-node
              env:
                  SUPERTOKENS_CORE_VERSION: ${{ steps.versions.outputs.coreVersion }}
              run: docker compose up --wait

            - name: Install SDK dependencies
              working-directory: supertokens-node
              run: npm i

            - name: Start test server
              working-directory: supertokens-node/test/frontendIntegration
              env:
                  TEST_MODE: testing
              run: |
                  npm i

                  NODE_PORT=8080 node . &> ${{ steps.envs.outputs.APP_SERVER_LOG_DIR }}/app-server.log &
                  NODE_PORT=8082 node . &> ${{ steps.envs.outputs.APP_SERVER_LOG_DIR }}/app-server-cross-domain.log &

            - uses: supertokens/website-testing-action@main
              with:
                  version: ${{ steps.versions.outputs.websiteVersion }}
                  node-sdk-version: ${{ steps.versions.outputs.nodeVersion }}
                  path: supertokens-website
                  check-name-suffix: "[Node=${{ matrix.node-version }}][FDI=${{ matrix.fdi-version }}]"
                  app-server-logs: ${{ steps.envs.outputs.APP_SERVER_LOG_DIR }}

    test-gate:
        runs-on: ubuntu-latest
        needs: [test]
        if: always() && github.event_name == 'pull_request'
        steps:
            - name: Evaluate test requirement
              env:
                  LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
                  TEST_RESULT: ${{ needs.test.result }}
              run: |
                  has_run_tests=$(echo "$LABELS"  | jq 'contains(["run-tests"])')
                  has_skip_tests=$(echo "$LABELS" | jq 'contains(["skip-tests"])')

                  if [[ "$has_skip_tests" == "true" ]]; then
                    echo "Tests explicitly skipped via 'skip-tests' label."
                    exit 0
                  elif [[ "$has_run_tests" == "true" ]]; then
                    if [[ "$TEST_RESULT" == "success" || "$TEST_RESULT" == "skipped" ]]; then
                      echo "Tests passed (result: $TEST_RESULT)."
                      exit 0
                    else
                      echo "::error::Tests did not pass (result: $TEST_RESULT)."
                      exit 1
                    fi
                  else
                    echo "::error::No test label found. Add 'run-tests' to run tests, or 'skip-tests' to bypass."
                    exit 1
                  fi
