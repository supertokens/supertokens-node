name: Auth-React Tests - L1

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - labeled
            - unlabeled
    push:
        branches:
            - "[0-9]+.[0-9]+"
        paths-ignore:
            - "**.md"
            - "docs/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    skip-check:
        runs-on: ubuntu-latest
        outputs:
            should-skip: ${{ steps.skip.outputs.should_skip }}
        steps:
            - uses: fkirc/skip-duplicate-actions@v5
              id: skip
              with:
                  paths: '["lib/**", "test/**", "package.json", "package-lock.json", "tsconfig.json"]'
                  paths_ignore: '["lib/ts/version.ts", "lib/build/version.js"]'
                  skip_after_successful_duplicate: "true"

    define-versions:
        if: |
            needs.skip-check.outputs.should-skip != 'true' &&
            (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
        needs: [skip-check]
        runs-on: ubuntu-latest
        outputs:
            fdiVersions: ${{ steps.matrix.outputs.fdiVersions }}
            fdiVersionMap: ${{ steps.matrix.outputs.fdiVersionMap }}
            extraAxes: ${{ steps.matrix.outputs.extraAxes }}
        steps:
            - uses: actions/checkout@v4
            - uses: supertokens/actions/generate-test-matrix@main
              id: matrix
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  include-fdi: "true"
                  upstream-fdi-repos: '["supertokens-auth-react","supertokens-node"]'
                  extra-axes: '{"node-version":["20"]}'
                  latest-extra: '{"node-version":"20"}'

    setup-auth-react:
        if: |
            needs.skip-check.outputs.should-skip != 'true' &&
            (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
        runs-on: ubuntu-latest
        needs: [skip-check, define-versions]
        strategy:
            fail-fast: false
            matrix:
                fdi-version: ${{ fromJSON(needs.define-versions.outputs.fdiVersions) }}

        outputs:
            AUTH_REACT__LOG_DIR: ${{ steps.envs.outputs.AUTH_REACT__LOG_DIR }}
            AUTH_REACT__SCREENSHOT_DIR: ${{ steps.envs.outputs.AUTH_REACT__SCREENSHOT_DIR }}
            AUTH_REACT__APP_SERVER: ${{ steps.envs.outputs.AUTH_REACT__APP_SERVER }}
            AUTH_REACT__NODE_PORT: ${{ steps.envs.outputs.AUTH_REACT__NODE_PORT }}
            AUTH_REACT__TEST_MODE: ${{ steps.envs.outputs.AUTH_REACT__TEST_MODE }}
            AUTH_REACT__PORT: ${{ steps.envs.outputs.AUTH_REACT__PORT }}
            specs: ${{ steps.envs.outputs.specs }}
            matrix: ${{ steps.setup-matrix.outputs.matrix }}

        steps:
            - name: Get node and auth-react versions for FDI
              id: versions
              run: |
                  nodeVersion=$(echo '${{ needs.define-versions.outputs.fdiVersionMap }}' | jq -r '.["supertokens-node"]["${{ matrix.fdi-version }}"]')
                  authReactVersion=$(echo '${{ needs.define-versions.outputs.fdiVersionMap }}' | jq -r '.["supertokens-auth-react"]["${{ matrix.fdi-version }}"]')

                  echo "nodeVersion=${nodeVersion}" >> $GITHUB_OUTPUT
                  echo "authReactVersion=${authReactVersion}" >> $GITHUB_OUTPUT

            - uses: supertokens/actions/auth-react-testing-action/setup@main
              id: envs
              with:
                  auth-react-version: ${{ steps.versions.outputs.authReactVersion }}
                  node-sdk-version: ${{ steps.versions.outputs.nodeVersion }}
                  fdi-version: ${{ matrix.fdi-version }}

            - id: setup-matrix
              uses: supertokens/actions/extended-matrix-action@main
              with:
                  artifact-id: ${{ matrix.fdi-version }}
                  matrix: |
                      node-version: ${{ toJSON(fromJSON(needs.define-versions.outputs.extraAxes)['node-version']) }}
                      spec: ${{ steps.envs.outputs.specs }}

    launch-fdi-workflows:
        if: |
            needs.skip-check.outputs.should-skip != 'true' &&
            (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
        uses: ./.github/workflows/auth-react-test-2.yml
        needs:
            - skip-check
            - define-versions
            - setup-auth-react
        strategy:
            max-parallel: 1 # This is important to avoid ddos GHA API
            fail-fast: false # Don't fail fast to avoid locking TF State
            matrix:
                fdi-version: ${{ fromJSON(needs.define-versions.outputs.fdiVersions) }}
        name: FDI ${{ matrix.fdi-version }}
        with:
            artifact-id: ${{ matrix.fdi-version }}
            AUTH_REACT__LOG_DIR: ${{ needs.setup-auth-react.outputs.AUTH_REACT__LOG_DIR }}
            AUTH_REACT__SCREENSHOT_DIR: ${{ needs.setup-auth-react.outputs.AUTH_REACT__SCREENSHOT_DIR }}
            AUTH_REACT__APP_SERVER: ${{ needs.setup-auth-react.outputs.AUTH_REACT__APP_SERVER }}
            AUTH_REACT__NODE_PORT: ${{ needs.setup-auth-react.outputs.AUTH_REACT__NODE_PORT }}
            AUTH_REACT__TEST_MODE: ${{ needs.setup-auth-react.outputs.AUTH_REACT__TEST_MODE }}
            AUTH_REACT__PORT: ${{ needs.setup-auth-react.outputs.AUTH_REACT__PORT }}

    test-gate:
        runs-on: ubuntu-latest
        needs: [launch-fdi-workflows]
        if: always() && github.event_name == 'pull_request'
        steps:
            - name: Evaluate test requirement
              env:
                  LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
                  TEST_RESULT: ${{ needs.launch-fdi-workflows.result }}
              run: |
                  has_run_tests=$(echo "$LABELS"  | jq 'contains(["run-tests"])')
                  has_skip_tests=$(echo "$LABELS" | jq 'contains(["skip-tests"])')

                  if [[ "$has_skip_tests" == "true" ]]; then
                    echo "Tests explicitly skipped via 'skip-tests' label."
                    exit 0
                  elif [[ "$has_run_tests" == "true" ]]; then
                    if [[ "$TEST_RESULT" == "success" || "$TEST_RESULT" == "skipped" ]]; then
                      echo "Tests passed (result: $TEST_RESULT)."
                      exit 0
                    else
                      echo "::error::Tests did not pass (result: $TEST_RESULT)."
                      exit 1
                    fi
                  else
                    echo "::error::No test label found. Add 'run-tests' to run tests, or 'skip-tests' to bypass."
                    exit 1
                  fi
