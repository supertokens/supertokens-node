name: "Check if docs need an update"

on:
    push:
        branches:
            - "[0-9]+.[0-9]+"

permissions:
    contents: write

# Only one instance of this workflow will run on the same ref (PR/Branch/Tag)
# Previous runs will be cancelled.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check-docs:
        name: Check if docs need an update
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.ref }}
                  # Need a complete fetch to make the master merge check work
                  fetch-depth: 0
                  fetch-tags: true
                  token: ${{ secrets.ALL_REPO_PAT }}

            - name: Setup git
              run: |
                  # NOTE: The user email is {user.id}+{user.login}@users.noreply.github.com.
                  # See users API: https://api.github.com/users/github-actions%5Bbot%5D
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git fetch origin master

            - uses: actions/setup-node@v5
              with:
                  node-version: 20

            - name: Populate variables
              id: versions
              run: |
                  . ./hooks/populate-hook-constants.sh

                  echo "packageVersion=$packageVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
                  echo "packageVersionXy=$packageVersionXy" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
                  echo "packageLockVersion=$packageLockVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
                  echo "packageLockVersionXy=$packageLockVersionXy" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
                  echo "newestVersion=$newestVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
                  echo "targetBranch=$targetBranch" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

            - name: Check tag and branch correctness
              run: |
                  if [[ "${{ steps.versions.outputs.packageVersion }}" != "${{ steps.versions.outputs.packageLockVersion }}" ]]
                  then
                      echo "The package version and package lock version do not match."
                      exit 1
                  fi

                  if [[ "refs/heads/${{ steps.versions.outputs.packageVersion }}" != ${{ github.ref }}* ]]
                  then
                      echo "Branch name and package version mismatch"
                      exit 1
                  fi

            - name: Check if source files changed since last docs update
              id: check-source
              run: |
                  # Find the commit where docs/ was last modified
                  LAST_DOCS_COMMIT=$(git log -1 --format="%H" -- docs/)

                  if [ -z "$LAST_DOCS_COMMIT" ]; then
                    echo "No docs found, need to generate"
                    echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  echo "Last docs commit: $LAST_DOCS_COMMIT"

                  # Check if any TypeScript source files changed since that commit
                  # Also check package.json in case typedoc version changed
                  CHANGED_FILES=$(git diff --name-only "$LAST_DOCS_COMMIT" HEAD -- 'lib/ts/**/*.ts' 'package.json' 'package-lock.json')

                  if [ -n "$CHANGED_FILES" ]; then
                    echo "Source files changed since last docs update:"
                    echo "$CHANGED_FILES"
                    echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "No source files changed since last docs update, skipping rebuild"
                    echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Install dependencies
              if: steps.check-source.outputs.needs_rebuild == 'true'
              run: npm install

            - name: Build docs
              if: steps.check-source.outputs.needs_rebuild == 'true'
              run: |
                  npm run build-pretty
                  npm run build-docs

            - name: Commit and push docs
              if: steps.check-source.outputs.needs_rebuild == 'true'
              run: |
                  git add docs/

                  # Check if there are staged changes to commit
                  if git diff --cached --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "doc: update docs for v${{ steps.versions.outputs.packageVersion }} tag"
                    git push
                  fi
