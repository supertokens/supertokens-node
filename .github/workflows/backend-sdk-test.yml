name: "Backend SDK Tests"

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - labeled
            - unlabeled
    push:
        branches:
            - "[0-9]+.[0-9]+"
        paths-ignore:
            - "**.md"
            - "docs/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    skip-check:
        runs-on: ubuntu-latest
        outputs:
            should-skip: ${{ steps.skip.outputs.should_skip }}
        steps:
            - uses: fkirc/skip-duplicate-actions@v5
              id: skip
              with:
                  paths: '["lib/**", "test/**", "package.json", "package-lock.json", "tsconfig.json"]'
                  paths_ignore: '["lib/ts/version.ts", "lib/build/version.js"]'
                  skip_after_successful_duplicate: "true"

    define-versions:
        if: |
            needs.skip-check.outputs.should-skip != 'true' &&
            (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
        needs: [skip-check]
        runs-on: ubuntu-latest
        outputs:
            coreCdiVersionMap: ${{ steps.matrix.outputs.coreCdiVersionMap }}
            testMatrix: ${{ steps.matrix.outputs.testMatrix }}
        steps:
            - uses: actions/checkout@v4
            - uses: supertokens/actions/generate-test-matrix@main
              id: matrix
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  include-cdi: "true"
                  include-fdi: "true"
                  strategy: primary-full
                  extra-axes: '{"node-version":["20"]}'
                  latest-extra: '{"node-version":"20"}'

    test:
        if: |
            needs.skip-check.outputs.should-skip != 'true' &&
            (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-tests'))
        runs-on: ubuntu-latest
        needs: [skip-check, define-versions]

        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.define-versions.outputs.testMatrix) }}

        env:
            API_PORT: 3030
            SUPERTOKENS_CORE_PORT: 3567
            SUPERTOKENS_CORE_HOST: localhost

        steps:
            - uses: actions/checkout@v4
              with:
                  # Checking out to a custom path since the test repo will also be cloned
                  path: supertokens-node

            - name: Get core version
              id: core-version
              run: |
                  coreVersion=$(echo '${{ needs.define-versions.outputs.coreCdiVersionMap }}' | jq -r '.["${{ matrix.cdi-version }}"]')
                  echo "coreVersion=${coreVersion}" >> $GITHUB_OUTPUT

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Start core
              working-directory: supertokens-node
              run: docker compose up --build --wait
              env:
                  SUPERTOKENS_CORE_VERSION: ${{ steps.core-version.outputs.coreVersion }}

            - name: Install SDK dependencies
              working-directory: supertokens-node
              run: npm install

            - name: Start test server
              working-directory: supertokens-node/test/test-server
              env:
                  SUPERTOKENS_ENV: testing
              run: |
                  npm install
                  npm start &

            - uses: supertokens/actions/backend-sdk-testing-action@main
              with:
                  version: ${{ matrix.fdi-version }}
                  check-name-suffix: "[CDI=${{ matrix.cdi-version }}][Core=${{ steps.core-version.outputs.coreVersion }}][FDI=${{ matrix.fdi-version }}][Node=${{ matrix.node-version }}]"
                  path: backend-sdk-testing

            - uses: pmeier/pytest-results-action@main
              name: Surface failing tests
              if: always()
              with:
                  path: backend-sdk-testing/test-results.xml
                  summary: true
                  title: "Backend SDK Test Results"

    test-gate:
        runs-on: ubuntu-latest
        needs: [test]
        if: always() && github.event_name == 'pull_request'
        steps:
            - name: Evaluate test requirement
              env:
                  LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
                  TEST_RESULT: ${{ needs.test.result }}
              run: |
                  has_run_tests=$(echo "$LABELS"  | jq 'contains(["run-tests"])')
                  has_skip_tests=$(echo "$LABELS" | jq 'contains(["skip-tests"])')

                  if [[ "$has_skip_tests" == "true" ]]; then
                    echo "Tests explicitly skipped via 'skip-tests' label."
                    exit 0
                  elif [[ "$has_run_tests" == "true" ]]; then
                    if [[ "$TEST_RESULT" == "success" || "$TEST_RESULT" == "skipped" ]]; then
                      echo "Tests passed (result: $TEST_RESULT)."
                      exit 0
                    else
                      echo "::error::Tests did not pass (result: $TEST_RESULT)."
                      exit 1
                    fi
                  else
                    echo "::error::No test label found. Add 'run-tests' to run tests, or 'skip-tests' to bypass."
                    exit 1
                  fi
